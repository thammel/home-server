<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Expense</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<a href="/">← Back</a>

<section>
    <h2>New Expense</h2>
    <input id="description" placeholder="Description">
    <input id="amount" type="number" step="0.01" placeholder="Amount">
    <input id="paid-by" type="number" placeholder="Paid by (user ID)">

    <h3>Shares (percent)</h3>
    <div id="shares-container">
    </div>

    <div style="margin-top:8px">
        <button id="add-expense-btn" onclick="addExpense()">Add Expense</button>
    </div>
</section>

<script type="module" src="/static/js/expense.js"></script>

</body>
</html>

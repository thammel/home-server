<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expense Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<main class="container">

<nav>
    <ul><li><a id="back-link" href="/">← Back</a></li></ul>
</nav>

<h1 id="expense-title">Expense Details</h1>
<article>
    <dl id="expense-meta"></dl>

    <hr>

    <h3>Balances</h3>
    <table id="shares-table">
        <thead><tr><th>Name</th><th>Balance</th></tr></thead>
        <tbody></tbody>
    </table>
</article>

<div id="actions" hidden>
    <button id="edit-btn">Edit</button>
    <button id="delete-btn" class="outline contrast">Delete</button>
</div>

<article id="edit-form" hidden>
    <h3>Edit Expense</h3>
    <div class="grid">
        <input id="edit-date" type="date">
        <input id="edit-description" placeholder="Description">
    </div>
    <div class="grid">
        <input id="edit-category" placeholder="Category" list="category-list">
        <datalist id="category-list"></datalist>
        <input id="edit-comment" placeholder="Comment">
    </div>
    <div class="grid">
        <input id="edit-cost" type="number" step="0.01" min="0.01" placeholder="Cost">
        <input id="edit-currency" placeholder="Currency (e.g. EUR)">
    </div>
    <label for="edit-paid-by">Paid by</label>
    <select id="edit-paid-by"></select>

    <h4>Shares</h4>
    <button type="button" class="secondary" id="edit-split-btn">Split equally</button>
    <div id="edit-shares-container"></div>

    <p id="edit-error" class="error" hidden></p>
    <div class="expense-actions" style="margin-top: 1rem;">
        <button id="edit-save-btn">Save</button>
        <button id="edit-cancel-btn" class="outline secondary">Cancel</button>
    </div>
</article>

</main>
<script type="module" src="/static/js/expense.js"></script>
</body>
</html>

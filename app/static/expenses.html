<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Expense</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<a href="/">← Back</a>

<section>
    <h2>New Expense</h2>
    <input id="date" type="date">
    <input id="description" placeholder="Description">
    <input id="category" placeholder="Category">
    <input id="cost" type="number" step="0.01" placeholder="Cost">
    <input id ="currency" placeholder="EUR">
    <input id="comment" placeholder="Comment">
    <select id="paid-by"></select>

    <h3>Shares</h3>
    <button type="button" onclick="splitEqually()">Split equally</button>
    <div id="shares-container">
    </div>

    <div style="margin-top:8px">
        <button id="add-expense-btn" onclick="addExpense()">Add Expense</button>
    </div>
</section>

<script type="module" src="/static/js/expenses.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Expense</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<main class="container">

<nav>
    <ul><li><a href="/">← Back</a></li></ul>
</nav>

<article>
    <h2>New Expense</h2>
    <input id="date" type="date">
    <input id="description" placeholder="Description">
    <input id="category" placeholder="Category" list="category-list">
    <datalist id="category-list"></datalist>
    <div class="grid">
        <input id="cost" type="number" step="0.01" placeholder="Cost">
        <input id="currency" placeholder="Currency (e.g. EUR)">
    </div>
    <input id="comment" placeholder="Comment">
    <label for="paid-by">Paid by</label>
    <select id="paid-by"></select>

    <h3>Shares</h3>
    <button type="button" class="secondary" onclick="splitEqually()">Split equally</button>
    <div id="shares-container"></div>

    <button id="add-expense-btn" onclick="addExpense()">Add Expense</button>
</article>

</main>
<script type="module" src="/static/js/expenses.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin – Flat Expenses</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<main class="container">

<nav>
    <ul><li><a href="/">← Back</a></li></ul>
    <ul><li><strong>Admin</strong></li></ul>
</nav>

<section>
    <h2>Users</h2>
    <figure>
        <table id="users-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Admin</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-body"></tbody>
        </table>
    </figure>
</section>

<section>
    <article>
        <h2>Add User</h2>
        <form id="add-user-form">
            <input id="new-name" placeholder="Username" autocomplete="off" required>
            <input id="new-password" type="password" placeholder="Password" required>
            <button type="submit">Add User</button>
        </form>
        <p id="add-user-error" class="error"></p>
    </article>
</section>


<section>
    <article>
        <h2>Settings</h2>
        <label>Settlement mode</label>
        <div role="group">
            <button id="mode-simplified" type="button">Simplified</button>
            <button id="mode-full" type="button" class="secondary">Full</button>
        </div>
        <p id="settings-msg"></p>
    </article>
</section>

</main>
<script type="module" src="/static/js/admin.js"></script>
</body>
</html>

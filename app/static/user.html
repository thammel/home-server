<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
<main class="container">

<nav>
    <ul><li><a href="/">← Back</a></li></ul>
    <ul><li><button id="settings-btn" type="button" class="secondary" style="display:none">Settings</button></li></ul>
</nav>

<h1 id="username"></h1>

<div role="tablist" style="display:flex;gap:0.5rem;margin-bottom:1.5rem;">
    <button id="tab-overview" role="tab" aria-selected="true">Overview</button>
    <button id="tab-stats" role="tab" aria-selected="false" class="outline secondary">Stats</button>
</div>

<div id="panel-overview">
    <section>
        <h2>Settlements</h2>
        <div id="balance"></div>
    </section>

    <section>
        <h2>Expenses</h2>
        <table id="expenses">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Cost</th>
                    <th>Your share</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
</div>

<div id="panel-stats" hidden>
    <section>
        <h2>Expenses by Month</h2>
        <canvas id="monthly-chart"></canvas>
    </section>
</div>

</main>
<script type="module" src="/static/js/user.js"></script>
</body>
</html>
